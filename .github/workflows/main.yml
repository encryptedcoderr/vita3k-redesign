name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JVM_OPTS: -Xmx6G
      VCPKG_ROOT: /usr/local/share/vcpkg

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Vita3K source with submodules
        run: |
          git clone --recursive https://github.com/Vita3K/Vita3K-Android vita3k-src
          cd vita3k-src
          git submodule update --init --recursive

      - name: Apply redesign files from zip
        run: |
          unzip Vita3K-Android-12-redesigned.zip

          # Android XML + manifest
          cp Vita3K-Android-12/android/src/main/res/values/colors.xml \
             vita3k-src/android/src/main/res/values/colors.xml
          cp Vita3K-Android-12/android/src/main/res/values/styles.xml \
             vita3k-src/android/src/main/res/values/styles.xml
          cp Vita3K-Android-12/android/src/main/AndroidManifest.xml \
             vita3k-src/android/src/main/AndroidManifest.xml

          # ImGui / C++ sources
          cp Vita3K-Android-12/vita3k/gui/src/gui.cpp \
             vita3k-src/vita3k/gui/src/gui.cpp
          cp Vita3K-Android-12/vita3k/gui/src/home_screen.cpp \
             vita3k-src/vita3k/gui/src/home_screen.cpp
          cp Vita3K-Android-12/vita3k/gui/src/app_context_menu.cpp \
             vita3k-src/vita3k/gui/src/app_context_menu.cpp
          cp Vita3K-Android-12/vita3k/gui/src/information_bar.cpp \
             vita3k-src/vita3k/gui/src/information_bar.cpp
          cp Vita3K-Android-12/vita3k/compat/include/compat/state.h \
             vita3k-src/vita3k/compat/include/compat/state.h

      - uses: hendrikmuhs/ccache-action@v1.2

      - name: Restore Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle') }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up build environment
        run: |
          sudo apt-get install -y ninja-build
          cd vita3k-src
          vcpkg install \
            boost-system:arm64-android \
            boost-filesystem:arm64-android \
            boost-program-options:arm64-android \
            boost-icl:arm64-android \
            boost-variant:arm64-android \
            openssl:arm64-android \
            zlib:arm64-android

      - name: Copy assets
        run: |
          cd vita3k-src
          cp -r data android/assets
          cp -r lang android/assets
          cp -r vita3k/shaders-builtin android/assets

      - name: Build debug APK
        run: |
          cd vita3k-src
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vita3k-debug.apk
          path: vita3k-src/android/build/outputs/apk/debug/android-debug.apk
