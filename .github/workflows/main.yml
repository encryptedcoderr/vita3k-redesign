name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JVM_OPTS: -Xmx6G
      VCPKG_ROOT: /usr/local/share/vcpkg

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Unzip source
        run: |
          unzip Vita3K-Android-12-redesigned.zip
          mv Vita3K-Android-12/* .
          mv Vita3K-Android-12/.github .github-src || true
          mv Vita3K-Android-12/.gitmodules . || true
          rm -rf Vita3K-Android-12

      - name: Init submodules
        run: |
          git submodule update --init --recursive

      - uses: hendrikmuhs/ccache-action@v1.2

      - name: Restore Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/
            ${{ env.VCPKG_ROOT }}/installed
            ${{ env.VCPKG_ROOT }}/packages
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/build.gradle') }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up build environment
        run: |
          sudo apt-get install -y ninja-build
          vcpkg install \
            boost-system:arm64-android \
            boost-filesystem:arm64-android \
            boost-program-options:arm64-android \
            boost-icl:arm64-android \
            boost-variant:arm64-android \
            openssl:arm64-android \
            zlib:arm64-android

      - name: Copy assets
        run: |
          cp -r data android/assets
          cp -r lang android/assets
          cp -r vita3k/shaders-builtin android/assets

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vita3k-debug.apk
          path: android/build/outputs/apk/debug/android-debug.apk
